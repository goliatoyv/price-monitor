name: Price Monitor

on:
  schedule:
    - cron: "0 8 * * *"     # раз в день в 8:00 UTC (11:00 Киев)
  workflow_dispatch:          # кнопка ручного запуска в GitHub

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price monitor
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python price_monitor.py

      - name: Save price history to repo
        run: |
          git config user.name "Price Monitor Bot"
          git config user.email "actions@github.com"
          git add price_history.json
          git diff --cached --quiet || git commit -m "price history update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
